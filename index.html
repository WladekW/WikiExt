<!doctype html>
<html>
    <head>
        <title>Covid-19 Stats- UK</title>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <section id="def"></section>
        <div class="shadow"></div>
    </body>
    <style>
        body {
            width: 320px;
            margin: 0;
            padding: 4px;
            background-color: #fff;
        }
        img {
            width: 100%;
        }
        h1 {
            text-align: center;
        }
        #def {
            display: grid;
            font-size: 16px;
        }
        #def > div {
            padding: 16px;
            text-align: justify;
        }
        *::-webkit-scrollbar {
            width: 4px;
        }
        *::-webkit-scrollbar-track {
            background: none;
        }
        *::-webkit-scrollbar-thumb {
            background-color: #222;
        }
        *::-webkit-scrollbar-thumb:hover {
            background-color: #666;
        }
        a {
            color: #66a;
            font-size: 18px;
            margin-top: 12px;
        }
    </style>
    <script src="popup.js" type="module"></script>
</html>
